<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        pre::first-line{
            color:blue;
        }
        pre::first-letter{
            color:palevioletred;
        }
        pre::before{
            content:"###";
        }
         pre::after{
            content:"$$$";
            color:mediumspringgreen;
            background-color: rgb(32, 109, 109);
        }
        
    </style>
</head>
<body>
    <pre>
        hyper text markup language

        cascading <span style=color:blue>style</span> sheet

        the technologies are using in frontend web page
    </pre>
</body>
</html>
