<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Converted Full Screen</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
    }

    #box {
        width: 100px;
        height: 100px;
        background-color: red;
        position: absolute;

        animation: moveBox 5s linear infinite;
    }

    @keyframes moveBox {
        0% {
            left: 0;
            top: 0;
        }

        25% {
            left: calc(100vw - 100px);
            top: 0;
        }

        50% {
            left: calc(100vw - 100px);
            top: calc(100vh - 100px);
        }

        75% {
            left: 0;
            top: calc(100vh - 100px);
        }

        100% {
            left: 0;
            top: 0;
        }
    }
</style>
</head>

<body>

<div id="box"></div>

</body>
</html>
